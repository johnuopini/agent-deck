# GoReleaser configuration
# https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-deck
    main: ./cmd/agent-deck
    binary: agent-deck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: johnuopini
    name: agent-deck
  draft: false
  prerelease: false
  mode: append
  name_template: "v{{.Version}}"
  header: |
    ## Agent Deck v{{.Version}} (fork)

    Terminal session manager for AI coding agents.

    ### Installation

    Download the binary for your platform from the assets below, extract, and
    place in your PATH (`~/.local/bin/` or `/usr/local/bin/`).

    Existing installs: `agent-deck update` will pick up this release automatically.
  footer: |
    ---

    **Full Changelog**: https://github.com/johnuopini/agent-deck/compare/{{ .PreviousTag }}...{{ .Tag }}
